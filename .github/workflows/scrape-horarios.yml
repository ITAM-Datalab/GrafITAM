name: Scrape horarios ITACA

on:
  schedule:
    - cron: '17 8 * * *' # diario, 08:17 UTC (~02:17 hora CDMX)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr scraper
        run: python horarios_scraper.py

      - name: Commit y push si hay cambios
        run: |
          if git status --porcelain jsonHorarios/ | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add jsonHorarios/
            git commit -m "chore(horarios): actualiza datos de horarios $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Sin cambios en jsonHorarios/"
          fi
